name: CI

on:
  push:
  pull_request:

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install dependencies
        run: python -m pip install -e ".[dev]"
      - name: Lint
        run: ruff check .
      - name: Format check
        run: ruff format --check .
      - name: Type check
        run: mypy src
      - name: Test
        # Fail the build if coverage regresses below the floor. The ES adapter
        # is covered by the separate retrieval-eval job, so this gate reflects
        # the unit suite's reach.
        run: pytest -q --cov=code_rag --cov-report=term-missing --cov-fail-under=78

  # Verify the package imports and tests pass without the optional tree-sitter
  # grammars, exercising the regex chunker fallback path.
  test-minimal:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
        # pytest-asyncio is test tooling (not an optional runtime extra), so it
        # is installed here too; without it the async tests' marker is unknown
        # and the warnings-as-errors filter turns that into a collection error.
      - name: Install without optional extras
        run: python -m pip install -e . pytest pytest-cov pytest-asyncio
      - name: Test (regex chunker fallback)
        env:
          CODE_RAG_USE_TREE_SITTER: "false"
        run: pytest -q

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build image
        run: docker build -t code-rag:ci .

  retrieval-eval:
    runs-on: ubuntu-latest
    services:
      elasticsearch:
        image: docker.elastic.co/elasticsearch/elasticsearch:8.14.3
        env:
          discovery.type: single-node
          xpack.security.enabled: "false"
          ES_JAVA_OPTS: -Xms1g -Xmx1g
        ports:
          - 9200:9200
        options: >-
          --health-cmd "curl -fsS http://localhost:9200/_cluster/health || exit 1"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 12
    env:
      CODE_RAG_ELASTICSEARCH_URL: http://localhost:9200
      CODE_RAG_TEST_ELASTICSEARCH_URL: http://localhost:9200
      CODE_RAG_ALLOW_REQUEST_SUPPLIED_PERMISSIONS: "true"
      CODE_RAG_INDEX_PREFIX: ci-${{ github.run_id }}-
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install dependencies
        run: python -m pip install -e ".[dev,integration]"
      - name: Integration tests
        run: pytest -q tests/test_elasticsearch_integration.py
      - name: Seed evaluation corpus
        run: python tests/fixtures/seed_eval_index.py
      - name: Retrieval quality gate
        run: >-
          code-rag evaluate tests/fixtures/retrieval_golden.json
          --k 8
          --min-recall 1.0
          --min-mrr 1.0
          --min-ndcg 1.0
